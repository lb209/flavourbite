<!DOCTYPE html>
<html>
<head>
    <title>Create / Update</title>
</head>

<body style="font-family:arial;background:#f2f2f2;">

<div style="width:500px;margin:auto;background:white;padding:20px;margin-top:40px;border-radius:10px;">

<h2 style="text-align:center;">Student Form</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <input type="text" name="name" placeholder="Name"
        value="{{ student.name }}"
        style="width:100%;padding:10px;margin:5px;"><br>

    <input type="email" name="email" placeholder="Email"
        value="{{ student.email }}"
        style="width:100%;padding:10px;margin:5px;"><br>

    <input type="number" name="age" placeholder="Age"
        value="{{ profile.age }}"
        style="width:100%;padding:10px;margin:5px;"><br>

    <input type="text" name="city" placeholder="City"
        value="{{ profile.city }}"
        style="width:100%;padding:10px;margin:5px;"><br>

    <input type="text" name="phone" placeholder="Phone"
        value="{{ profile.phone }}"
        style="width:100%;padding:10px;margin:5px;"><br>

    <input type="file" name="image"
        style="width:100%;padding:10px;margin:5px;"><br>

    <button style="width:100%;padding:10px;background:green;color:white;">
        Save
    </button>

</form>

</div>

</body>
</html>
