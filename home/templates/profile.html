<h1>{{ student.name }} Profile</h1>
<p>{{ student.email }}</p>

<h2>Books:</h2>

{% for book in books %}
    <div style="padding:10px; border:1px solid black; margin:5px;">
        <h3>{{ book.book_name }}</h3>
        <p>{{ book.author }}</p>
        <p>{{ book.price }}</p>
    </div>
{% endfor %}

<a href="{% url 'read' %}">Back</a>
