<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
</head>

<body style="margin:0; font-family:Arial; background:linear-gradient(120deg,#4facfe,#00f2fe); height:100vh; display:flex; justify-content:center; align-items:center;">

    <div style="background:white; padding:30px; border-radius:15px; width:320px; box-shadow:0px 10px 30px rgba(0,0,0,0.3);">

        <h2 style="text-align:center; color:#333;">Login</h2>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username"
                style="width:100%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:8px;">

            <input type="password" name="password" placeholder="Password"
                style="width:100%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:8px;">

            <button type="submit"
                style="width:100%; padding:10px; background:#4facfe; border:none; color:white; border-radius:8px; cursor:pointer;">
                Login
            </button>
        </form>

        <p style="text-align:center; margin-top:10px;">
            Don't have account?
            <a href="/register/" style="color:#4facfe; text-decoration:none;">Register</a>
        </p>

        <p style="color:red; text-align:center;">{{ error }}</p>

    </div>

</body>
</html>
