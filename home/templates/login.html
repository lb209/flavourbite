<h1>Login</h1>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Username">
    <br><br>

    <input type="password" name="password" placeholder="Password">
    <br><br>

    <button type="submit">
        Login
    </button>
    {% for message in messages %}

    <h3>{{ message }}</h3>

{% endfor %}
</form>
